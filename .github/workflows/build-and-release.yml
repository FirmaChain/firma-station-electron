name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'S3 subfolder (e.g., v1.2.1). Empty = use package.json version with "v" prefix.'
        required: false
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            network: mainnet
          - os: macos-latest
            network: testnet
          - os: windows-latest
            network: mainnet
          - os: windows-latest
            network: testnet
          - os: ubuntu-latest
            network: mainnet
          - os: ubuntu-latest
            network: testnet
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} (${{ matrix.network }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve version subfolder
        id: version
        shell: bash
        run: |
          INPUT="${{ inputs.version }}"
          if [ -z "$INPUT" ]; then
            INPUT="v$(node -p "require('./package.json').version")"
          fi
          echo "subfolder=$INPUT" >> "$GITHUB_OUTPUT"
          echo "Uploading under s3://firmachain.dev/$INPUT/"

      - name: Set network to ${{ matrix.network }}
        shell: bash
        run: npm run set:${{ matrix.network }}

      - name: Build mainnet
        if: matrix.network == 'mainnet'
        shell: bash
        run: npx tsc && npx electron-builder --publish never

      - name: Build testnet
        if: matrix.network == 'testnet'
        shell: bash
        run: |
          npx tsc && npx electron-builder --publish never \
            --config.appId=com.firmachain.station.testnet \
            --config.artifactName='${productName}-testnet-${os}-${arch}-${version}.${ext}'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Upload artifacts to S3
        shell: bash
        run: |
          aws s3 cp dist/ "s3://firmachain.dev/${{ steps.version.outputs.subfolder }}/" \
            --recursive \
            --acl public-read \
            --exclude "*" \
            --include "Firma Station*.dmg" \
            --include "Firma Station*.zip" \
            --include "Firma Station*.exe" \
            --include "Firma Station*.deb" \
            --include "Firma Station*.blockmap" \
            --include "latest*.yml"
