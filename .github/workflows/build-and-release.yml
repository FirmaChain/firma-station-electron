name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the S3 path (e.g., v1.2.1). Empty = use package.json version with "v" prefix.'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            network: mainnet
          - os: macos-latest
            network: testnet
          - os: windows-latest
            network: mainnet
          - os: windows-latest
            network: testnet
          - os: ubuntu-latest
            network: mainnet
          - os: ubuntu-latest
            network: testnet
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} (${{ matrix.network }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve version tag
        id: version
        shell: bash
        run: |
          INPUT="${{ inputs.version }}"
          if [ -z "$INPUT" ]; then
            INPUT="v$(node -p "require('./package.json').version")"
          fi
          echo "tag=$INPUT" >> "$GITHUB_OUTPUT"
          echo "Uploading under s3://prod-firmachain-station-electron/${{ matrix.network }}/$INPUT/"

      - name: Build (${{ matrix.network }})
        shell: bash
        run: npm run build:${{ matrix.network }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::681301424914:role/prod-firmachain-deploy-station-electron
          aws-region: ap-southeast-1

      - name: Upload artifacts to S3
        shell: bash
        env:
          SOURCE_DIR: ${{ matrix.network == 'testnet' && 'dist-testnet' || 'dist' }}
          S3_PATH: s3://prod-firmachain-station-electron/${{ matrix.network }}/${{ steps.version.outputs.tag }}/
        run: |
          aws s3 cp "$SOURCE_DIR/" "$S3_PATH" \
            --recursive \
            --exclude "*" \
            --include "Firma Station*.dmg" \
            --include "Firma Station*.zip" \
            --include "Firma Station*.exe" \
            --include "Firma Station*.deb" \
            --include "Firma Station*.blockmap" \
            --include "latest*.yml"
